<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
</head>
<body style="margin:0;padding:0;background:#0f1117;font-family:-apple-system,BlinkMacSystemFont,sans-serif">

<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding:32px 16px">
            <table width="560" cellpadding="0" cellspacing="0">

                <tr>
                    <td style="background:#1a1730;border-radius:16px 16px 0 0;padding:40px;text-align:center">
                        <h1 style="font-size:26px;color:#f0eeff;margin:0 0 12px">
                            Your post is scheduled to go live in 12 hour
                        </h1>
                        <p style="font-size:14px;color:#8b85a0;margin:0 0 28px">
                            Review it one last time before it goes live.
                        </p>
                        <!-- Dynamic URL -->
                        <a th:href="${redirectUrl}"
                           style="display:inline-block;background:#6c63ff;color:#fff;font-size:14px;padding:13px 32px;border-radius:10px;text-decoration:none">
                            View your post
                        </a>
                    </td>
                </tr>


                <tr>
                    <td style="background:#13151f;border-radius:0 0 16px 16px;padding:32px 40px">
                        <table width="100%" style="background:#1a1d2e;border-radius:10px">
                            <tr>
                                <td style="padding:16px 20px">


                                    <table width="100%">
                                        <tr>
                                            <td style="font-size:12px;color:#5a5670;padding:8px 0;
                                                           border-bottom:1px solid rgba(255,255,255,0.05)">
                                                Post title
                                            </td>
                                            <td align="right" style="font-size:12px;color:#c8c2e0;padding:8px 0;
                                                                          border-bottom:1px solid rgba(255,255,255,0.05)">
                                                <!-- Dynamic Post Title -->
                                                <span th:text="${postTitle}">Post title here</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td style="font-size:12px;color:#5a5670;padding:8px 0;
                                                           border-bottom:1px solid rgba(255,255,255,0.05)">
                                                Scheduled for
                                            </td>
                                            <td align="right" style="font-size:12px;color:#c8c2e0;padding:8px 0;
                                                                          border-bottom:1px solid rgba(255,255,255,0.05)">

                                                <span th:text="${scheduledTime}">3:00 PM</span>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td style="font-size:12px;color:#5a5670;padding:8px 0">Status</td>
                                            <td align="right" style="font-size:12px;color:#4ade80;padding:8px 0">
                                                ● Scheduled
                                            </td>
                                        </tr>
                                    </table>

                                </td>
                            </tr>
                        </table>
                    </td>
                </tr>

            </table>
        </td>
    </tr>
</table>

</body>
</html>
