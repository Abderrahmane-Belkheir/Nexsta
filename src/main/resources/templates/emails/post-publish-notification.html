<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<body style="margin:0;padding:0;background-color:#f6f8fb;">

<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#f6f8fb">
    <tr>
        <td align="center" style="padding:48px 12px;">

            <!-- Main Card -->

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;background:#ffffff;border:1px solid #e6e8eb;">

                <tr>
                    <td style="padding:28px 28px 24px 28px;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">

                        <!-- Subtle Header -->

                        <div style="font-size:12px;color:#9aa1a9;letter-spacing:0.04em;margin-bottom:16px;">
                            POST UPDATE
                        </div>

                        <!-- Title -->

                        <div style="font-size:22px;line-height:1.3;font-weight:600;color:#0b0f19;margin-bottom:10px;">
                            Your post is scheduled
                        </div>

                        <!-- Description -->

                        <div style="font-size:14px;line-height:1.6;color:#4b5563;margin-bottom:26px;">
                            Everything is set. Your post will be published in
                            <strong style="color:#0b0f19;">12 hours</strong>.
                        </div>

                        <!-- Button -->

                        <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom:28px;">
                            <tr>
                                <td bgcolor="#111827">
                                    <a th:href="${redirectUrl}" target="_blank"
                                       style="display:inline-block;padding:10px 18px;font-size:13px;color:#ffffff;text-decoration:none;font-weight:600;font-family:inherit;">
                                        Review post
                                    </a>
                                </td>
                            </tr>
                        </table>

                        <!-- Divider -->

                        <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                                <td height="1" bgcolor="#eceef1"></td>
                            </tr>
                        </table>

                        <!-- Meta Section -->

                        <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-top:18px;">

                            <tr>
                                <td style="font-size:11px;color:#9aa1a9;padding-bottom:6px;">
                                    Release time
                                </td>
                                <td align="right" style="font-size:11px;color:#9aa1a9;padding-bottom:6px;">
                                    Visibility
                                </td>
                            </tr>

                            <tr>
                                <td style="font-size:13px;color:#0b0f19;padding-bottom:14px;" th:text="${scheduledTime}">
                                    3:00 PM (GMT+1)
                                </td>
                                <td align="right" style="font-size:13px;color:#0b0f19;padding-bottom:14px;">
                                    Public
                                </td>
                            </tr>

                            <tr>
                                <td style="font-size:11px;color:#9aa1a9;padding-bottom:6px;">
                                    Status
                                </td>
                            </tr>

                            <tr>
                                <td style="font-size:13px;color:#16a34a;font-weight:600;">
                                    Scheduled
                                </td>
                            </tr>

                        </table>

                    </td>
                </tr>
            </table>

            <!-- Footer -->

            <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width:480px;">
                <tr>
                    <td align="center" style="padding:18px 10px;font-size:11px;color:#9aa1a9;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif;">
                        Your Company • Algiers<br>
                        <a href="#" style="color:#6b7280;text-decoration:none;">
                            Manage notifications
                        </a>
                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
